<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idea Spark - AI Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; overflow-x: hidden; }
        .font-display { font-family: 'Space Grotesk', sans-serif; }
        .gradient-bg { position: fixed; top:0; left:0; width:100%; height:100%; background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #0a0a0a 100%); z-index:-2; }
        .orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity:0.4; animation: float 20s infinite ease-in-out; z-index:-1; }
        .orb-1 { width: 400px; height:400px; background:#6366f1; top:-100px; left:-100px; animation-delay:0s; }
        .orb-2 { width: 300px; height:300px; background:#ec4899; bottom:-50px; right:-50px; animation-delay:-5s; }
        .orb-3 { width: 250px; height:250px; background:#06b6d4; top:50%; left:50%; animation-delay:-10s; }
        @keyframes float {0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(30px,-50px) scale(1.1);}66%{transform:translate(-20px,20px) scale(0.9);}}
        .idea-card { transition: all 0.5s cubic-bezier(0.4,0,0.2,1); transform-style: preserve-3d; }
        .idea-card.spinning { animation: spin 0.6s ease-in-out; }
        @keyframes spin {0%{transform:rotateY(0deg) scale(1);}50%{transform:rotateY(180deg) scale(0.9);}100%{transform:rotateY(360deg) scale(1);}}
        .glow-button { position: relative; overflow: hidden; transition: all 0.3s ease; }
        .glow-button::before { content:''; position:absolute; top:-2px; left:-2px; right:-2px; bottom:-2px; background:linear-gradient(45deg,#6366f1,#ec4899,#06b6d4,#6366f1); border-radius:inherit; z-index:-1; opacity:0; transition: opacity 0.3s ease; background-size:400% 400%; animation: gradient 3s ease infinite; }
        .glow-button:hover::before { opacity:1; }
        @keyframes gradient {0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
        .saved-item { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn {from {opacity:0; transform:translateX(-20px);} to {opacity:1; transform:translateX(0);}}
        .delete-btn { opacity:0; transition:opacity 0.2s; }
        .saved-item:hover .delete-btn { opacity:1; }
        .tag { transition: all 0.2s ease; }
        .tag:hover { transform:translateY(-2px); box-shadow:0 4px 12px rgba(99,102,241,0.3);}
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);}
    </style>
</head>
<body class="text-white min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Background -->
    <div class="gradient-bg"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Main Container -->
    <main class="w-full max-w-4xl relative z-10"> 

        <!-- Header -->
        <header class="text-center mb-12">
            <h1 class="font-display text-5xl md:text-7xl font-bold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 via-purple-400 to-cyan-400">Idea Spark AI</h1>
            <p class="text-gray-400 text-lg">Turn boredom into brilliant AI-generated ideas</p>
        </header>

        <!-- Main Card -->
        <div class="glass rounded-3xl p-8 md:p-12 mb-8 shadow-2xl">

            <!-- Category Filter -->
            <div class="flex flex-wrap justify-center gap-3 mb-8">
                <button onclick="setCategory('all')" class="tag px-4 py-2 rounded-full text-sm font-medium bg-white/10 hover:bg-white/20 border border-white/10 transition-all active-category" data-cat="all">✨ All Ideas</button>
                <button onclick="setCategory('tech')" class="tag px-4 py-2 rounded-full text-sm font-medium bg-white/5 hover:bg-white/20 border border-white/10 transition-all" data-cat="tech">💻 Tech</button>
                <button onclick="setCategory('creative')" class="tag px-4 py-2 rounded-full text-sm font-medium bg-white/5 hover:bg-white/20 border border-white/10 transition-all" data-cat="creative">🎨 Creative</button>
                <button onclick="setCategory('life')" class="tag px-4 py-2 rounded-full text-sm font-medium bg-white/5 hover:bg-white/20 border border-white/10 transition-all" data-cat="life">🌱 Life</button>
                <button onclick="setCategory('fun')" class="tag px-4 py-2 rounded-full text-sm font-medium bg-white/5 hover:bg-white/20 border border-white/10 transition-all" data-cat="fun">🎮 Fun</button>
            </div>

            <!-- Idea Display -->
            <div id="ideaCard" class="idea-card min-h-[200px] flex flex-col items-center justify-center text-center mb-8 p-6 rounded-2xl bg-white/5 border border-white/10">
                <div id="ideaContent" class="transform transition-all duration-300">
                    <span id="ideaEmoji" class="text-6xl mb-4 block">💡</span>
                    <h2 id="ideaText" class="font-display text-2xl md:text-4xl font-bold mb-3 text-white">Ready to spark something new?</h2>
                    <p id="ideaDesc" class="text-gray-400 text-lg">Click below to generate your next project idea</p>
                </div>
            </div>

            <!-- Buttons -->
            <div class="flex flex-col sm:flex-row gap-4 justify-center items-center">
                <button onclick="generateIdea()" class="glow-button px-8 py-4 rounded-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold text-lg shadow-lg hover:shadow-indigo-500/25 hover:scale-105 transition-all flex items-center gap-2">
                    ⚡ Generate Idea
                </button>
                <button onclick="saveCurrentIdea()" id="saveBtn" class="px-6 py-4 rounded-full bg-white/10 hover:bg-white/20 text-white font-semibold border border-white/20 transition-all flex items-center gap-2 opacity-50 cursor-not-allowed" disabled>💾 Save Idea</button>
                <button onclick="copyIdea()" class="px-6 py-4 rounded-full bg-white/10 hover:bg-white/20 text-white font-semibold border border-white/20 transition-all flex items-center gap-2">📋 Copy Idea</button>
            </div>
        </div>

        <!-- Saved Ideas -->
        <div id="savedSection" class="glass rounded-3xl p-6 md:p-8 hidden">
            <h3 class="font-display text-2xl font-bold mb-6 flex items-center gap-2">🔥 Saved Sparks <span id="savedCount" class="text-sm font-normal text-gray-400 bg-white/10 px-3 py-1 rounded-full">0</span></h3>
            <div id="savedList" class="space-y-3 max-h-[300px] overflow-y-auto pr-2"></div>
        </div>

    </main>

    <script>
        // AI Setup
        const OPENAI_API_KEY = "YOUR_OPENAI_API_KEY"; // Replace with your API key

        let currentCategory = 'all';
        let currentIdea = null;
        let savedIdeas = JSON.parse(localStorage.getItem('savedIdeas')) || [];

        document.addEventListener('DOMContentLoaded', () => {
            updateSavedDisplay();
            if (savedIdeas.length > 0) document.getElementById('savedSection').classList.remove('hidden');
        });

        function setCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.tag').forEach(btn => {
                if (btn.dataset.cat === cat) btn.classList.add('bg-white/20','shadow-lg'); 
                else btn.classList.remove('bg-white/20','shadow-lg');
            });
            generateIdea();
        }

        async function generateIdea() {
            const card = document.getElementById('ideaCard');
            const content = document.getElementById('ideaContent');
            const saveBtn = document.getElementById('saveBtn');

            card.classList.add('spinning');
            content.style.opacity = '0';
            document.getElementById('ideaText').textContent = "Thinking...";
            document.getElementById('ideaDesc').textContent = "Generating something cool...";

            // Wait animation
            await new Promise(res => setTimeout(res, 500));

            // AI generation
            let prompt = `Give me a creative ${currentCategory === 'all' ? 'project' : currentCategory} idea in 1 sentence and a short description. Format as JSON: { "emoji": "...", "title": "...", "desc": "..." }`;
            try {
                const response = await fetch("https://api.openai.com/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${OPENAI_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "gpt-4o-mini",
                        messages: [{ role: "user", content: prompt }],
                        temperature: 0.8
                    })
                });
                const data = await response.json();
                let idea = data.choices[0].message.content;

                // Try parsing JSON from AI
                idea = JSON.parse(idea.replace(/```json|```/g, '').trim());

                currentIdea = idea;
                document.getElementById('ideaEmoji').textContent = idea.emoji;
                document.getElementById('ideaText').textContent = idea.title;
                document.getElementById('ideaDesc').textContent = idea.desc;

                content.style.opacity = '1';
                card.classList.remove('spinning');

                // Enable save button
                saveBtn.disabled = false;
                saveBtn.classList.remove('opacity-50','cursor-not-allowed');

            } catch(err) {
                console.error(err);
                document.getElementById('ideaText').textContent = "AI Error 😢";
                document.getElementById('ideaDesc').textContent = "Check your API key or connection.";
                content.style.opacity = '1';
                card.classList.remove('spinning');
            }
        }

        function saveCurrentIdea() {
            if (!currentIdea) return;
            if (savedIdeas.some(idea => idea.title === currentIdea.title)) return;
            savedIdeas.push({...currentIdea, id: Date.now()});
            localStorage.setItem('savedIdeas', JSON.stringify(savedIdeas));
            document.getElementById('savedSection').classList.remove('hidden');
            updateSavedDisplay();
        }

        function deleteIdea(id) {
            savedIdeas = savedIdeas.filter(i => i.id !== id);
            localStorage.setItem('savedIdeas', JSON.stringify(savedIdeas));
            updateSavedDisplay();
            if (savedIdeas.length === 0) document.getElementById('savedSection').classList.add('hidden');
        }

        function updateSavedDisplay() {
            const list = document.getElementById('savedList');
            const count = document.getElementById('savedCount');
            count.textContent = savedIdeas.length;
            if (savedIdeas.length === 0) {
                list.innerHTML = '<p class="text-gray-400 text-center">No saved ideas yet. Generate one!</p>';
                return;
            }
            list.innerHTML = savedIdeas.map(idea => `
                <div class="saved-item glass rounded-xl p-4 flex items-center justify-between group hover:bg-white/10 cursor-pointer" onclick="loadIdea(${idea.id})">
                    <div class="flex items-center gap-3">
                        <span class="text-2xl">${idea.emoji}</span>
                        <div>
                            <h4 class="font-bold text-white text-sm">${idea.title}</h4>
                            <p class="text-gray-400 text-xs">${idea.desc}</p>
                        </div>
                    </div>
                    <button onclick="event.stopPropagation(); deleteIdea(${idea.id})" class="delete-btn p-2 hover:bg-red-500/20 rounded-lg text-red-400">
                        ✖
                    </button>
                </div>
            `).join('');
        }

        function loadIdea(id) {
            const idea = savedIdeas.find(i => i.id === id);
            if (idea) {
                currentIdea = idea;
                document.getElementById('ideaEmoji').textContent = idea.emoji;
                document.getElementById('ideaText').textContent = idea.title;
                document.getElementById('ideaDesc').textContent = idea.desc;
            }
        }

        function copyIdea() {
            if (!currentIdea) return;
            navigator.clipboard.writeText(`${currentIdea.title} - ${currentIdea.desc}`);
            alert("Copied!");
        }

        // Keyboard shortcut: Spacebar generates idea
        document.addEventListener('keydown', e => { if(e.code==='Space'){ e.preventDefault(); generateIdea(); } });
    </script>
</body>
</html>
